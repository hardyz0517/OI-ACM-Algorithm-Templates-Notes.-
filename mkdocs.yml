site_name: 信息学竞赛笔记
site_author: Your Name

theme:
  name: material
  language: zh
  features:
    - navigation.tabs # 开启顶部导航栏
    - navigation.top  # 开启回到顶部按钮
  palette:
    scheme: default
    primary: indigo
    accent: indigo

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex: # 开启 LaTeX 数学公式支持
      generic: true

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js